<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROBCO INDUSTRIES — TERMINAL HACKING AID v2.3.1</title>
  <style>
    /* ============================================================
   RESET & BASE
   ============================================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #070a07;
      --bg2: #0c110c;
      --bg3: #111811;
      --green: #39ff14;
      --green-dim: #1e8c0a;
      --green-muted: #0d3d06;
      --green-hi: #aaff88;
      --amber: #ffb000;
      --red: #ff3c3c;
      --border: #1f4a1a;
      --border-hi: #39ff14;
      --glow: 0 0 8px #39ff1460;
      --glow-hi: 0 0 16px #39ff1499;
      --font: 'Courier New', 'Lucida Console', monospace;
      --radius: 8px;
      --scan-speed: 4s;
    }

    html {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
      /* CRT scanline overlay */
      position: relative;
    }

    /* Scanline effect via pseudo element on body */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom,
          transparent 0px,
          transparent 3px,
          rgba(0, 0, 0, 0.18) 3px,
          rgba(0, 0, 0, 0.18) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* Moving scanline bar */
    body::after {
      content: '';
      position: fixed;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to bottom,
          transparent 0%,
          rgba(57, 255, 20, 0.04) 50%,
          transparent 100%);
      animation: scan var(--scan-speed) linear infinite;
      pointer-events: none;
      z-index: 9998;
    }

    @keyframes scan {
      from {
        top: -120px;
      }

      to {
        top: 100vh;
      }
    }

    /* ============================================================
   LAYOUT
   ============================================================ */
    .outer {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 24px 40px;
    }

    /* Header */
    .header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .header-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--green-dim);
      text-transform: uppercase;
    }

    .header-main {
      font-size: 22px;
      letter-spacing: 2px;
      text-shadow: var(--glow-hi);
      color: var(--green-hi);
    }

    .header-sub {
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 1px;
    }

    .header-status {
      text-align: right;
      font-size: 11px;
      color: var(--green-dim);
      line-height: 1.7;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: var(--glow-hi);
      margin-right: 5px;
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    /* Two-column grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* ============================================================
   PANELS
   ============================================================ */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 0 24px rgba(57, 255, 20, 0.05);
    }

    .panel+.panel {
      margin-top: 0;
    }

    .panel-title {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--green-dim);
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::before {
      content: '▶';
      color: var(--green);
      font-size: 8px;
    }

    /* ============================================================
   INPUTS & TEXTAREA
   ============================================================ */
    label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--green-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    textarea,
    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--green);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: var(--green);
    }

    textarea:focus,
    input:focus {
      border-color: var(--green-dim);
      box-shadow: var(--glow);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.6;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      filter: invert(1) hue-rotate(90deg);
    }

    /* Input row */
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-row .field {
      flex: 1;
    }

    .input-row .field-narrow {
      flex: 0 0 90px;
    }

    /* ============================================================
   BUTTONS
   ============================================================ */
    button {
      font-family: var(--font);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--bg3);
      color: var(--green);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 14px;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }

    button:hover {
      background: var(--green-muted);
      border-color: var(--green);
      color: var(--green-hi);
      box-shadow: var(--glow);
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-primary {
      border-color: var(--green-dim);
      color: var(--green-hi);
    }

    .btn-primary:hover {
      background: #1a3d10;
      border-color: var(--green);
      box-shadow: var(--glow-hi);
    }

    .btn-danger {
      border-color: #5a1a1a;
      color: #ff8080;
    }

    .btn-danger:hover {
      background: #3a0a0a;
      border-color: var(--red);
      color: var(--red);
      box-shadow: 0 0 10px #ff3c3c44;
    }

    .btn-amber {
      border-color: #5a3a00;
      color: var(--amber);
    }

    .btn-amber:hover {
      background: #3a2400;
      border-color: var(--amber);
      box-shadow: 0 0 10px #ffb00044;
    }

    .btn-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    /* ============================================================
   ATTEMPT LIST
   ============================================================ */
    #attempt-list {
      list-style: none;
      max-height: 220px;
      overflow-y: auto;
      margin-top: 14px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg3);
    }

    #attempt-list li {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeIn 0.25s ease;
    }

    #attempt-list li:last-child {
      border-bottom: none;
    }

    #attempt-list li .attempt-word {
      color: var(--green-hi);
      font-weight: bold;
      letter-spacing: 2px;
      min-width: 90px;
    }

    #attempt-list li .attempt-score {
      color: var(--amber);
      font-size: 13px;
    }

    #attempt-list li .attempt-idx {
      color: var(--green-muted);
      font-size: 10px;
      min-width: 24px;
    }

    #attempt-list:empty::after {
      content: 'Nenhuma tentativa registrada.';
      display: block;
      padding: 12px 14px;
      color: var(--green-muted);
      font-size: 12px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(-8px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* ============================================================
   CANDIDATE LIST
   ============================================================ */
    .candidates-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .candidates-count {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--green-dim);
      text-transform: uppercase;
    }

    .candidates-count span {
      color: var(--green-hi);
      font-size: 18px;
      font-weight: bold;
      text-shadow: var(--glow);
    }

    #candidate-list {
      list-style: none;
      max-height: 420px;
      overflow-y: auto;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg3);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0;
    }

    #candidate-list li {
      padding: 9px 12px;
      font-size: 13px;
      letter-spacing: 2px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      color: var(--green);
      cursor: default;
      transition: background 0.15s, color 0.15s;
      animation: fadeIn 0.2s ease;
    }

    #candidate-list li:hover {
      background: var(--green-muted);
      color: var(--green-hi);
    }

    /* Word that was an exact attempt match */
    #candidate-list li.exact-match {
      color: var(--amber);
      background: #2a1a00;
      border-color: #5a3a00;
    }

    #candidate-list:empty::after {
      content: '[ SEM CANDIDATAS ]';
      display: block;
      padding: 20px;
      color: var(--red);
      font-size: 12px;
      letter-spacing: 3px;
      grid-column: 1 / -1;
      text-align: center;
    }

    /* ============================================================
   NOTIFICATION TOAST
   ============================================================ */
    #toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--bg2);
      border: 1px solid var(--green-dim);
      border-radius: var(--radius);
      padding: 12px 20px;
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--green-hi);
      box-shadow: var(--glow-hi);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 1000;
      max-width: 340px;
      text-transform: uppercase;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    #toast.toast-warn {
      border-color: var(--amber);
      color: var(--amber);
      box-shadow: 0 0 16px #ffb00044;
    }

    #toast.toast-error {
      border-color: var(--red);
      color: var(--red);
      box-shadow: 0 0 16px #ff3c3c44;
    }

    /* ============================================================
   SCROLLBAR STYLING
   ============================================================ */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--green-dim);
    }

    /* ============================================================
   DIVIDER
   ============================================================ */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* Progress bar: word elimination visual */
    .progress-wrap {
      margin-top: 10px;
      height: 4px;
      background: var(--bg3);
      border-radius: 2px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .progress-bar {
      height: 100%;
      background: var(--green);
      box-shadow: var(--glow);
      transition: width 0.4s ease;
      border-radius: 2px;
    }

    .progress-label {
      font-size: 10px;
      color: var(--green-dim);
      letter-spacing: 1px;
      margin-top: 4px;
      text-align: right;
    }

    /* Word-length badge */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid var(--green-dim);
      border-radius: 4px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--green-dim);
      text-transform: uppercase;
    }

    /* Attempt score input */
    #attempt-score::-webkit-inner-spin-button,
    #attempt-score::-webkit-outer-spin-button {
      appearance: none;
      margin: 0;
    }

    #attempt-score {
      -moz-appearance: textfield;
    }
  </style>
</head>

<body>

  <div class="outer">

    <!-- ======================== HEADER ======================== -->
    <header class="header">
      <div class="header-title">
        <div class="header-eyebrow">RobCo Industries — Terminal OS v3.1</div>
        <div class="header-main">◈ HACKING AID — WORD FILTER SYSTEM</div>
        <div class="header-sub">Fallout 76 / New Vegas — Password Recovery Assistant</div>
      </div>
      <div class="header-status">
        <span class="status-dot"></span>ONLINE<br>
        <span id="clock">--:--:--</span><br>
        <span id="word-length-badge" class="badge" style="margin-top:4px">LEN: ?</span>
      </div>
    </header>

    <!-- ======================== GRID ======================== -->
    <div class="grid">

      <!-- ======= LEFT COLUMN ======= -->
      <div>

        <!-- PANEL: Word List Input -->
        <div class="panel">
          <div class="panel-title">Lista de Palavras do Terminal</div>

          <label for="word-input">Cole ou digite as palavras (linha, vírgula ou espaço):</label>
          <textarea id="word-input" spellcheck="false" autocomplete="off" style="text-transform: uppercase"
            placeholder="Ex.: ACCESS&#10;ACTION&#10;AMOUNT&#10;ANSWER..."></textarea>

          <div class="btn-bar">
            <button class="btn-primary" onclick="loadWords()">▶ Carregar Lista</button>
            <button class="btn-danger" onclick="fullReset()">↺ Resetar Tudo</button>
          </div>
        </div>

        <!-- PANEL: Attempts -->
        <div class="panel" style="margin-top:20px">
          <div class="panel-title">Registrar Tentativa</div>

          <div class="input-row">
            <div class="field">
              <label for="attempt-word">Palavra tentada</label>
              <input type="text" id="attempt-word" maxlength="30" placeholder="Ex.: ACCESS" autocomplete="off"
                spellcheck="false" style="text-transform: uppercase" onkeydown="if(event.key==='Enter') addAttempt()"
                oninput="this.value = this.value.toUpperCase()">
            </div>
            <div class="field-narrow">
              <label for="attempt-score">Corretas</label>
              <input type="number" id="attempt-score" min="0" max="30" placeholder="0"
                oninput="this.value = this.value.replace(/\D/g, '')" onkeydown="if(event.key==='Enter') addAttempt()">
            </div>
          </div>

          <div class="btn-bar">
            <button class="btn-primary" onclick="addAttempt()">+ Adicionar</button>
            <button onclick="removeLastAttempt()">← Remover Última</button>
            <button onclick="clearAttempts()">✕ Limpar Tentativas</button>
          </div>

          <!-- Attempt history list -->
          <ul id="attempt-list"></ul>
        </div>

      </div>

      <!-- ======= RIGHT COLUMN ======= -->
      <div>

        <!-- PANEL: Candidates -->
        <div class="panel">
          <div class="panel-title">Candidatas Restantes</div>

          <div class="candidates-header">
            <div class="candidates-count">
              <span id="candidate-count">0</span> palavras
            </div>
            <!-- Dica Escondida button -->
            <button class="btn-amber" onclick="hiddenHint()"
              title="Simula clicar em [ ] — remove 1 palavra aleatória das candidatas">
              [ &nbsp;] Dica Escondida
            </button>
          </div>

          <!-- Elimination progress bar -->
          <div class="progress-wrap">
            <div class="progress-bar" id="progress-bar" style="width:100%"></div>
          </div>
          <div class="progress-label" id="progress-label"></div>

          <div class="divider"></div>

          <ul id="candidate-list"></ul>
        </div>

      </div>

    </div><!-- /grid -->

  </div><!-- /outer -->

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- ============================================================
     JAVASCRIPT
     ============================================================ -->
  <script>
    "use strict";

    /*
      ──────────────────────────────────────────────────────────────
      STATE
      ──────────────────────────────────────────────────────────────
    */
    let originalWords = [];   // Full original list (uppercased, validated)
    let wordLength = 0;    // Expected length, detected from first valid word
    let attempts = [];   // Array of { word: string, score: number }
    let hiddenWords = new Set(); // Words removed by "hidden hint" from candidates
    let candidates = [];   // Currently valid candidates (subset of originalWords)


    /*
      ──────────────────────────────────────────────────────────────
      UTILITY — similarity count
      Counts positions where two strings of equal length match exactly.
      ──────────────────────────────────────────────────────────────
    */
    function similarity(a, b) {
      let count = 0;
      for (let i = 0; i < a.length; i++) {
        if (a[i] === b[i]) count++;
      }
      return count;
    }


    /*
      ──────────────────────────────────────────────────────────────
      LOAD WORDS
      Parses the textarea, detects word length from first valid token,
      discards words with wrong length and alerts user if any were found.
      ──────────────────────────────────────────────────────────────
    */
    function loadWords() {
      const raw = document.getElementById('word-input').value;

      // Split by newlines, commas, and spaces; filter empties; uppercase
      const tokens = raw.split(/[\n,\s]+/)
        .map(w => w.trim().toUpperCase())
        .filter(w => w.length > 0 && /^[A-Z]+$/.test(w));

      if (tokens.length === 0) {
        showToast('Nenhuma palavra válida encontrada!', 'error');
        return;
      }

      // Detect expected length from first valid word
      wordLength = tokens[0].length;
      document.getElementById('word-length-badge').textContent = `LEN: ${wordLength}`;

      const valid = [];
      const invalid = [];

      for (const w of tokens) {
        if (w.length === wordLength) {
          if (!valid.includes(w)) valid.push(w); // deduplicate
        } else {
          invalid.push(w);
        }
      }

      if (invalid.length > 0) {
        showToast(`${invalid.length} palavra(s) ignorada(s) por tamanho incorreto: ${invalid.join(', ')}`, 'warn');
      }

      if (valid.length === 0) {
        showToast('Nenhuma palavra com o comprimento detectado!', 'error');
        return;
      }

      originalWords = valid;
      attempts = [];
      hiddenWords = new Set();

      updateAttemptList();
      applyFilter();
      showToast(`${valid.length} palavra(s) carregada(s) — comprimento ${wordLength}.`);
    }


    /*
      ──────────────────────────────────────────────────────────────
      ADD ATTEMPT
      Validates the attempted word (must have correct length) and the
      score (0 ≤ score ≤ wordLength). Then re-applies the filter.
      ──────────────────────────────────────────────────────────────
    */
    function addAttempt() {
      const wordRaw = document.getElementById('attempt-word').value.trim().toUpperCase();
      const scoreRaw = document.getElementById('attempt-score').value;

      // Guard: list must be loaded
      if (originalWords.length === 0) {
        showToast('Carregue a lista de palavras primeiro!', 'warn');
        return;
      }

      // Validate word
      if (!wordRaw || !/^[A-Z]+$/.test(wordRaw)) {
        showToast('Palavra inválida — use apenas letras.', 'error');
        return;
      }

      // Validate length
      if (wordRaw.length !== wordLength) {
        showToast(`A palavra deve ter ${wordLength} letras (detectado: ${wordRaw.length}).`, 'error');
        return;
      }

      // Validate score
      const score = parseInt(scoreRaw, 10);
      if (isNaN(score) || score < 0 || score > wordLength) {
        showToast(`Número de letras corretas deve ser entre 0 e ${wordLength}.`, 'error');
        return;
      }

      // Check if already attempted this exact word+score
      const dup = attempts.find(a => a.word === wordRaw && a.score === score);
      if (dup) {
        showToast(`Tentativa já registrada: ${wordRaw} – ${score}`, 'warn');
        return;
      }

      attempts.push({ word: wordRaw, score });

      // Clear input fields
      document.getElementById('attempt-word').value = '';
      document.getElementById('attempt-score').value = '';
      document.getElementById('attempt-word').focus();

      hiddenWords = new Set(); // reset hidden hints when attempt changes
      updateAttemptList();
      applyFilter();
    }


    /*
      ──────────────────────────────────────────────────────────────
      REMOVE LAST ATTEMPT
      Pops the most recent attempt and re-applies the filter.
      ──────────────────────────────────────────────────────────────
    */
    function removeLastAttempt() {
      if (attempts.length === 0) {
        showToast('Nenhuma tentativa para remover.', 'warn');
        return;
      }
      const removed = attempts.pop();
      hiddenWords = new Set();
      updateAttemptList();
      applyFilter();
      showToast(`Tentativa removida: ${removed.word}`);
    }


    /*
      ──────────────────────────────────────────────────────────────
      CLEAR ATTEMPTS
      Removes all attempts, restores full original list as candidates.
      ──────────────────────────────────────────────────────────────
    */
    function clearAttempts() {
      if (attempts.length === 0) return;
      attempts = [];
      hiddenWords = new Set();
      updateAttemptList();
      applyFilter();
      showToast('Todas as tentativas removidas.');
    }


    /*
      ──────────────────────────────────────────────────────────────
      FULL RESET
      Clears everything including the word list and textarea.
      ──────────────────────────────────────────────────────────────
    */
    function fullReset() {
      originalWords = [];
      wordLength = 0;
      attempts = [];
      hiddenWords = new Set();
      candidates = [];
      document.getElementById('word-input').value = '';
      document.getElementById('word-length-badge').textContent = 'LEN: ?';
      updateAttemptList();
      renderCandidates();
      showToast('Sistema resetado.');
    }


    /*
      ──────────────────────────────────────────────────────────────
      APPLY FILTER
      Core filtering logic. For each word in originalWords:
        1. Skip if it's in hiddenWords (removed by hidden hint).
        2. Check consistency with every attempt:
           similarity(word, attempt.word) === attempt.score  (exact match)
        3. If consistent with ALL attempts, it's a candidate.
      ──────────────────────────────────────────────────────────────
    */
    function applyFilter() {
      candidates = originalWords.filter(word => {
        // Skip words removed by the hidden hint feature
        if (hiddenWords.has(word)) return false;

        // Check against each registered attempt
        for (const attempt of attempts) {
          if (similarity(word, attempt.word) !== attempt.score) {
            return false;
          }
        }
        return true;
      });

      renderCandidates();
    }


    /*
      ──────────────────────────────────────────────────────────────
      RENDER CANDIDATES
      Displays candidate list sorted alphabetically, with attempt-exact
      words highlighted in amber.
      ──────────────────────────────────────────────────────────────
    */
    function renderCandidates() {
      const list = document.getElementById('candidate-list');
      const count = document.getElementById('candidate-count');
      const bar = document.getElementById('progress-bar');
      const lbl = document.getElementById('progress-label');

      // Collect words that are exact matches to any attempt
      const exactMatches = new Set(attempts.map(a => a.word));

      // Sort alphabetically
      const sorted = [...candidates].sort();

      list.innerHTML = '';

      for (const word of sorted) {
        const li = document.createElement('li');
        li.textContent = word;
        if (exactMatches.has(word)) {
          li.classList.add('exact-match');
          li.title = 'Esta palavra foi usada como tentativa';
        }
        list.appendChild(li);
      }

      count.textContent = candidates.length;

      // Progress bar: shows fraction eliminated
      const total = originalWords.length;
      if (total > 0) {
        const pct = Math.round((candidates.length / total) * 100);
        bar.style.width = pct + '%';
        const eliminated = total - candidates.length;
        lbl.textContent = `${eliminated} eliminada(s) de ${total} (${100 - pct}% descartado)`;
      } else {
        bar.style.width = '0%';
        lbl.textContent = '';
      }
    }


    /*
      ──────────────────────────────────────────────────────────────
      UPDATE ATTEMPT LIST UI
      Rebuilds the visual attempt history list.
      ──────────────────────────────────────────────────────────────
    */
    function updateAttemptList() {
      const list = document.getElementById('attempt-list');
      list.innerHTML = '';

      for (let i = 0; i < attempts.length; i++) {
        const { word, score } = attempts[i];
        const li = document.createElement('li');

        const idxSpan = document.createElement('span');
        idxSpan.className = 'attempt-idx';
        idxSpan.textContent = `#${i + 1}`;

        const wordSpan = document.createElement('span');
        wordSpan.className = 'attempt-word';
        wordSpan.textContent = word;

        const scoreSpan = document.createElement('span');
        scoreSpan.className = 'attempt-score';
        scoreSpan.textContent = `→ ${score} correta${score !== 1 ? 's' : ''}`;

        li.appendChild(idxSpan);
        li.appendChild(wordSpan);
        li.appendChild(scoreSpan);
        list.appendChild(li);
      }
    }


    /*
      ──────────────────────────────────────────────────────────────
      HIDDEN HINT
      Simulates clicking [ ] brackets in the game: removes one random
      word from the current candidates (not the original list).
      If 0 or 1 candidate remains, does nothing.
      ──────────────────────────────────────────────────────────────
    */
    function hiddenHint() {
      // Keep at least 1 candidate so the player doesn't lose info
      if (candidates.length <= 1) {
        showToast(
          candidates.length === 0
            ? 'Sem candidatas para remover.'
            : 'Apenas 1 candidata restante — dica não aplicada.',
          'warn'
        );
        return;
      }

      // Pick a random candidate that is NOT an exact attempt match
      // (prefer not to remove already-attempted words)
      const eligible = candidates.filter(w => !attempts.some(a => a.word === w));
      const pool = eligible.length > 0 ? eligible : candidates;

      const idx = Math.floor(Math.random() * pool.length);
      const removed = pool[idx];

      hiddenWords.add(removed);
      applyFilter();
      showToast(`[ ] Palavra removida: ${removed}`, 'normal');
    }


    /*
      ──────────────────────────────────────────────────────────────
      TOAST NOTIFICATION
      Short-lived status message at bottom-right.
      ──────────────────────────────────────────────────────────────
    */
    let toastTimer = null;

    function showToast(message, type = 'normal') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'show';

      if (type === 'warn') toast.classList.add('toast-warn');
      if (type === 'error') toast.classList.add('toast-error');

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.className = '';
      }, 3800);
    }


    /*
      ──────────────────────────────────────────────────────────────
      CLOCK — updates every second
      ──────────────────────────────────────────────────────────────
    */
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}:${s}`;
    }
    setInterval(updateClock, 1000);
    updateClock();


    /*
      ──────────────────────────────────────────────────────────────
      INITIALIZATION
      Starts with a completely clean state, no pre-loaded words or attempts.
      ──────────────────────────────────────────────────────────────
    */
    (function init() {
      // Start completely empty
    })();
  </script>

</body>
